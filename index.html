<!-- Chosen Palette: Organic Zen (Base: Deep Moss #0f100f, Accent: Lime #D4F937) -->
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=0">
    <title>Minto OS</title>
    
    <!-- PWA: Makes it an App -->
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#050505">
    <link rel="apple-touch-icon" href="639d7715983578b450da3fae_mintopng.png.png">

    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest" defer></script>
    
    <!-- Styles (Condensed for reliability) -->
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap');
        :root { --lime-accent: #D4F937; --text-main: #ffffff; }
        body { background-color: #050505; color: var(--text-main); font-family: 'Inter', sans-serif; -webkit-font-smoothing: antialiased; }
        .glass-card { background: rgba(255,255,255,0.03); backdrop-filter: blur(24px); border: 1px solid rgba(255,255,255,0.08); border-radius: 24px; }
        .glass-panel { background: rgba(0,0,0,0.2); border: 1px solid rgba(255,255,255,0.05); border-radius: 16px; }
        .btn-primary { background-color: var(--lime-accent); color: #000; font-weight: 600; border-radius: 99px; transition: 0.2s; }
        .btn-primary:active { transform: scale(0.95); }
        .input-zen { background: rgba(0,0,0,0.3); border: 1px solid rgba(255,255,255,0.1); border-radius: 12px; color: white; outline: none; }
        .input-zen:focus { border-color: var(--lime-accent); }
        @media screen and (max-width: 768px) { input, textarea, select { font-size: 16px !important; } }
        .hidden { display: none !important; }
        
        /* Specific UI Elements */
        .bento-card { background: #121212; border-radius: 32px; position: relative; overflow: hidden; border: 1px solid #1f1f1f; transition: transform 0.2s; }
        .bento-card:active { transform: scale(0.98); }
        .bento-card.accent { background: var(--lime-accent); color: black; border: none; }
        
        .month-selector-btn { position: relative; background: rgba(255,255,255,0.1); border-radius: 8px; padding: 4px 12px; display: flex; align-items: center; gap: 8px; }
        .month-selector-btn input { position: absolute; inset: 0; opacity: 0; width: 100%; height: 100%; }
        
        .checkbox-zen { appearance: none; width: 24px; height: 24px; border: 1px solid #444; border-radius: 6px; position: relative; }
        .checkbox-zen:checked { background: var(--lime-accent); border-color: var(--lime-accent); }
        .checkbox-zen:checked::after { content: '✓'; position: absolute; color: black; left: 5px; font-weight: bold; }
        
        /* Breath UI */
        .breath-ring-svg { transform: rotate(-90deg); width: 260px; height: 260px; margin: 0 auto; }
        .breath-ring-circle { fill: none; stroke: var(--lime-accent); stroke-width: 8; stroke-dasharray: 753; stroke-dashoffset: 753; transition: stroke-dashoffset 0.5s linear; }
        .breath-state-btn.active { background: var(--lime-accent); color: black; font-weight: bold; }
    </style>
</head>
<body class="min-h-screen relative overflow-x-hidden p-6">

    <!-- Header -->
    <header class="flex justify-between items-center mb-6">
        <div class="flex items-center gap-3" onclick="window.showScreen('DASHBOARD')">
            <div class="w-12 h-12 rounded-2xl bg-[#1A1A1A] border border-[#333] flex items-center justify-center p-1">
                <img src="639d7715983578b450da3fae_mintopng.png.png" class="h-full object-contain">
            </div>
            <div>
                <h1 class="text-sm font-bold">Minto OS</h1>
                <div class="flex items-center gap-2 text-[10px] text-gray-400">
                    <span id="status-dot" class="w-2 h-2 bg-red-500 rounded-full"></span>
                    <span id="status-text">Offline Storage</span>
                </div>
            </div>
        </div>
        <button id="auth-btn" onclick="window.handleAuth()" class="text-xs bg-[#1A1A1A] px-4 py-2 rounded-full text-white border border-[#333]">Login</button>
    </header>

    <!-- Screens Container -->
    <main class="relative">

        <!-- DASHBOARD -->
        <div id="screen-DASHBOARD" class="screen-content">
            <h2 class="text-3xl font-light text-white mb-6">Daily <span class="text-[var(--lime-accent)] font-bold">Protocols</span></h2>
            
            <!-- Widget -->
            <div class="glass-card p-4 mb-6 flex justify-between items-center" onclick="window.showScreen('CALENDAR')">
                <div><div class="text-[10px] text-gray-400 uppercase tracking-widest">Next Event</div><div id="dash-event" class="text-sm font-medium text-white mt-1">No events</div></div>
                <i data-lucide="calendar" class="text-gray-500"></i>
            </div>

            <div class="grid grid-cols-2 gap-3">
                <button onclick="window.showScreen('DEFRAG')" class="bento-card p-4 h-32 flex flex-col justify-between text-left"><i data-lucide="list-checks" class="text-[var(--lime-accent)]"></i><div><span class="text-sm font-bold text-white">Defrag</span><p class="text-[10px] text-gray-400">Priorities</p></div></button>
                <button onclick="window.showScreen('CALIBRATION')" class="bento-card p-4 h-32 flex flex-col justify-between text-left"><i data-lucide="wind" class="text-blue-400"></i><div><span class="text-sm font-bold text-white">Breathe</span><p class="text-[10px] text-gray-400">Cooling</p></div></button>
                <button onclick="window.showScreen('NOTEPAD')" class="bento-card p-4 h-32 flex flex-col justify-between text-left"><i data-lucide="sticky-note" class="text-white"></i><div><span class="text-sm font-bold text-white">Notes</span><p class="text-[10px] text-gray-400">Ideas</p></div></button>
                <button onclick="window.showScreen('CALENDAR')" class="bento-card p-4 h-32 flex flex-col justify-between text-left"><i data-lucide="calendar-days" class="text-white"></i><div><span class="text-sm font-bold text-white">Schedule</span><p class="text-[10px] text-gray-400">G-Cal</p></div></button>
                <button onclick="window.showScreen('BUDGET')" class="bento-card accent col-span-2 p-4 flex justify-between items-center text-left"><div class="flex gap-3 items-center"><div class="w-10 h-10 bg-black/10 rounded-full flex items-center justify-center"><i data-lucide="pie-chart" class="text-black"></i></div><div><span class="text-sm font-bold">Finance</span><p class="text-[10px] opacity-70">Resource Allocation</p></div></div><i data-lucide="chevron-right" class="text-black"></i></button>
                <button onclick="window.showScreen('SIMULATOR')" class="bento-card col-span-2 p-4 flex justify-between items-center text-left"><div class="flex gap-3 items-center"><div class="w-10 h-10 bg-[#222] rounded-full flex items-center justify-center"><i data-lucide="message-square" class="text-white"></i></div><div><span class="text-sm font-bold text-white">Simulator</span><p class="text-[10px] text-gray-400">Logic Training</p></div></div><i data-lucide="chevron-right" class="text-white"></i></button>
                <button onclick="window.showScreen('MORAL')" class="bento-card col-span-2 p-4 flex justify-between items-center text-left"><div class="flex gap-3 items-center"><div class="w-10 h-10 bg-[#222] rounded-full flex items-center justify-center"><i data-lucide="shield" class="text-white"></i></div><div><span class="text-sm font-bold text-white">Directives</span><p class="text-[10px] text-gray-400">Moral Code</p></div></div><i data-lucide="chevron-right" class="text-white"></i></button>
            </div>
        </div>

        <!-- BUDGET -->
        <div id="screen-BUDGET" class="screen-content hidden">
            <div class="glass-card p-4 mb-4 sticky top-0 z-20 bg-[#050505]">
                <div class="flex justify-between items-center mb-4">
                    <h2 class="text-lg font-bold text-white">Allocation</h2>
                    <div class="flex gap-2">
                        <button onclick="window.toggleBudgetMode()" id="btn-mode" class="text-[10px] px-3 py-1 bg-[#222] rounded-full text-[var(--lime-accent)]">Monthly</button>
                        <label class="month-selector-btn"><i data-lucide="calendar" class="w-4 h-4 text-[var(--lime-accent)]"></i><input type="month" id="budget-month" onchange="window.changeMonth(this.value)"></label>
                    </div>
                </div>
                <div class="grid grid-cols-3 gap-2 text-center text-xs">
                    <div class="bg-[#1A1A1A] p-2 rounded-lg"><div class="text-gray-500">IN</div><div id="sum-inc" class="text-white">₹0</div></div>
                    <div class="bg-[#1A1A1A] p-2 rounded-lg"><div class="text-gray-500">OUT</div><div id="sum-exp" class="text-white">₹0</div></div>
                    <div class="bg-[#1A1A1A] p-2 rounded-lg border border-[var(--lime-accent)]"><div class="text-[var(--lime-accent)]">NET</div><div id="sum-net" class="text-white">₹0</div></div>
                </div>
                <div class="flex justify-between mt-4">
                    <button onclick="window.print()" class="text-xs text-gray-400 flex gap-1"><i data-lucide="printer" class="w-3 h-3"></i> Print</button>
                    <button onclick="document.getElementById('ai-chat').classList.remove('hidden')" class="text-xs text-[var(--lime-accent)] flex gap-1"><i data-lucide="bot" class="w-3 h-3"></i> AI CFO</button>
                </div>
            </div>
            <div id="budget-list" class="pb-20 space-y-2"></div>
            <div id="ai-chat" class="hidden fixed inset-0 z-50 bg-[#050505] p-4 flex flex-col">
                <div class="flex justify-between mb-4"><h3 class="text-[var(--lime-accent)] font-bold">CFO AI</h3><button onclick="document.getElementById('ai-chat').classList.add('hidden')" class="text-white">✕</button></div>
                <div id="chat-history" class="flex-1 overflow-y-auto mb-4"></div>
                <div class="flex gap-2"><input id="chat-input" class="w-full input-zen p-3" placeholder="Ask..."><button onclick="window.sendChat()" class="btn-primary w-12 flex items-center justify-center"><i data-lucide="send" class="w-4 h-4"></i></button></div>
            </div>
        </div>

        <!-- DEFRAG -->
        <div id="screen-DEFRAG" class="screen-content hidden">
            <div class="flex justify-between items-end mb-6"><div><h2 class="text-2xl font-light text-white">Defrag</h2><p id="defrag-date" class="text-xs text-[var(--lime-accent)]">Today</p></div><div id="defrag-status" class="text-[10px] text-gray-500">Saved</div></div>
            <div id="defrag-list" class="space-y-3"></div>
            <div class="mt-6"><button onclick="window.resetDefrag()" class="text-xs text-red-400 w-full">Clear</button></div>
        </div>

        <!-- NOTES -->
        <div id="screen-NOTEPAD" class="screen-content hidden h-full flex flex-col">
            <div class="glass-card p-4 flex-1 flex flex-col">
                <input id="note-title" class="bg-transparent text-xl text-white font-bold mb-4 outline-none" placeholder="Title" oninput="window.saveNotepad()">
                <textarea id="note-body" class="flex-1 bg-transparent text-sm text-gray-300 resize-none outline-none" placeholder="Type..." oninput="window.saveNotepad()"></textarea>
                <div id="note-status" class="text-[10px] text-gray-500 text-right">Saved</div>
            </div>
        </div>

        <!-- BREATHE -->
        <div id="screen-CALIBRATION" class="screen-content hidden flex flex-col items-center justify-center h-full">
            <div class="breath-ring-container mb-10">
                <svg class="breath-ring-svg" viewBox="0 0 260 260"><circle cx="130" cy="130" r="120" fill="none" stroke="#333" stroke-width="8"></circle><circle id="breath-ring" cx="130" cy="130" r="120" class="breath-ring-circle"></circle></svg>
                <div class="absolute inset-0 flex items-center justify-center"><div id="breath-core" class="breath-inner-circle"><span id="breath-text" class="text-white text-sm tracking-widest">READY</span></div></div>
            </div>
            <div class="flex gap-2 w-full max-w-xs">
                <button onclick="window.startBreathe('Anxiety')" class="flex-1 py-2 bg-[#222] rounded-full text-xs text-gray-300 border border-[#333]">Anxiety</button>
                <button onclick="window.startBreathe('Stress')" class="flex-1 py-2 bg-[#222] rounded-full text-xs text-gray-300 border border-[#333]">Stress</button>
            </div>
            <button onclick="window.stopBreathe()" class="mt-6 text-xs text-red-400">Stop</button>
        </div>

        <!-- SIMULATOR & MORAL & CALENDAR (Simplified for length, fully functional via JS) -->
        <div id="screen-SIMULATOR" class="screen-content hidden"><div class="glass-card p-6"><h2 id="sim-topic" class="text-white text-lg mb-4">Loading...</h2><div id="sim-ui"></div></div></div>
        <div id="screen-MORAL" class="screen-content hidden"><div id="moral-list" class="space-y-2"></div><div class="glass-panel p-2 mt-4 flex gap-2"><input id="moral-input" class="w-full bg-transparent text-white outline-none" placeholder="Add..."><button onclick="window.addMoral()" class="text-[var(--lime-accent)]"><i data-lucide="plus"></i></button></div></div>
        <div id="screen-CALENDAR" class="screen-content hidden"><div class="glass-card p-4"><input id="cal-title" class="w-full input-zen p-2 mb-2" placeholder="Event"><div class="flex gap-2 mb-2"><input id="cal-date" type="date" class="flex-1 input-zen p-2"><input id="cal-time" type="time" class="flex-1 input-zen p-2"></div><button onclick="window.addEvent()" class="w-full btn-primary py-2">Add</button><div id="event-list" class="mt-4 space-y-2"></div></div></div>

        <!-- Back Button Overlay (Except Dashboard) -->
        <div id="back-btn" class="fixed top-6 left-6 z-50 hidden" onclick="window.showScreen('DASHBOARD')"><div class="w-10 h-10 bg-black/50 rounded-full flex items-center justify-center backdrop-blur-md border border-white/10 text-white"><i data-lucide="arrow-left" class="w-5 h-5"></i></div></div>

    </main>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getFirestore, doc, setDoc, onSnapshot, enableIndexedDbPersistence } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";
        import { getAuth, signInWithPopup, GoogleAuthProvider, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";

        // --- CONFIG ---
        // PASTE YOUR FIREBASE CONFIG HERE
        const firebaseConfig = {
             apiKey: "AIzaSyAds-oPZv686w9sqHz3NGfV2mafNCGwR8w",
            authDomain: "minto-os.firebaseapp.com",
            projectId: "minto-os",
            storageBucket: "minto-os.firebasestorage.app",
            messagingSenderId: "683735878462",
            appId: "1:683735878462:web:2a3d7bd761bd9a30c67a6f",
            measurementId: "G-GK3P1STGVC"
        };
        const apiKey = "AIzaSyDRAqvQVccL8YSKjyNc8N3ih9YYmMtJ3Dc"; // GEMINI API KEY

        // --- APP CORE ---
        const budgetTemplate = [
             { id: 'income', title: 'Income', items: ['Salary', 'Freelance', 'Dividends', 'Other'] },
             { id: 'living', title: 'Daily Living', items: ['Groceries', 'Dining', 'Personal', 'Clothes'] },
             { id: 'home', title: 'Home', items: ['Rent', 'Utilities', 'Internet', 'Maintenance'] },
             { id: 'transpo', title: 'Transport', items: ['Fuel', 'Insurance', 'Repairs', 'Uber'] },
             { id: 'savings', title: 'Savings', items: ['Emergency', 'Investments', 'Retirement'] }
        ];

        let state = { 
            budget: {}, defrag: {}, notepad: {title:'',body:''}, events: [], moral: [], 
            month: new Date().toISOString().slice(0,7), mode: 'monthly' 
        };
        let app, db, auth, userRef, breatheInterval;

        // GLOBAL BINDINGS
        window.showScreen = (id) => {
            document.querySelectorAll('.screen-content').forEach(e => e.classList.add('hidden'));
            document.getElementById(`screen-${id}`).classList.remove('hidden');
            document.getElementById('back-btn').classList.toggle('hidden', id==='DASHBOARD');
            
            // Lazy load modules
            if(id==='BUDGET') renderBudget();
            if(id==='DEFRAG') renderDefrag();
            if(id==='CALENDAR') renderEvents();
            if(id==='MORAL') renderMoral();
            if(id==='SIMULATOR') initSim();
            if(id==='NOTEPAD') { document.getElementById('note-title').value=state.notepad.title; document.getElementById('note-body').value=state.notepad.body; }
            
            setTimeout(()=>lucide.createIcons(), 50);
        };

        // --- AUTH & SYNC (Hybrid Engine) ---
        async function init() {
            try {
                if(firebaseConfig.apiKey !== "YOUR_API_KEY") {
                    app = initializeApp(firebaseConfig);
                    db = getFirestore(app);
                    auth = getAuth(app);
                    
                    // ENABLE OFFLINE STORAGE (The "Widget" Magic)
                    enableIndexedDbPersistence(db).catch(e => console.log("Offline persistence error", e));

                    onAuthStateChanged(auth, (u) => {
                        if(u) {
                            document.getElementById('status-text').innerText = "Cloud Sync";
                            document.getElementById('status-dot').className = "w-2 h-2 bg-[var(--lime-accent)] rounded-full";
                            document.getElementById('auth-btn').innerText = "Logout";
                            userRef = doc(db, "users", u.uid);
                            onSnapshot(userRef, (s) => {
                                if(s.exists()) { state = {...state, ...s.data()}; refreshUI(); }
                            });
                        } else loadLocal();
                    });
                } else loadLocal();
            } catch(e) { loadLocal(); }
            
            // Force Icons
            lucide.createIcons();
        }

        function loadLocal() {
            const s = localStorage.getItem('minto_v5');
            if(s) state = JSON.parse(s);
            refreshUI();
        }

        function saveData() {
            localStorage.setItem('minto_v5', JSON.stringify(state)); // Phone Storage
            if(auth && auth.currentUser && userRef) setDoc(userRef, state, {merge:true}); // Cloud Storage
        }

        window.handleAuth = async () => {
            if(!auth) return alert("Config Missing");
            if(auth.currentUser) { await signOut(auth); location.reload(); }
            else { try { await signInWithPopup(auth, new GoogleAuthProvider()); } catch(e) { alert(e.message); } }
        }

        // --- BUDGET ---
        function renderBudget() {
            const list = document.getElementById('budget-list');
            list.innerHTML = '';
            const m = state.month;
            document.getElementById('budget-month').value = m;
            
            // Yearly View
            if(state.mode === 'yearly') {
                const y = m.split('-')[0];
                const months = Object.keys(state.budget).filter(k=>k.startsWith(y)).sort();
                months.forEach(mo => {
                    let inc=0, exp=0;
                    state.budget[mo].forEach(c => c.items.forEach(i => { if(c.id==='income') inc+=i.a; else exp+=i.a; }));
                    list.innerHTML += `<div class="glass-panel p-3 mb-2 flex justify-between"><span class="text-white">${mo}</span><span class="text-[var(--lime-accent)]">Net: ₹${inc-exp}</span></div>`;
                });
                return;
            }

            // Init Month
            if(!state.budget[m]) state.budget[m] = budgetTemplate.map(c=>({ id:c.id, title:c.title, items:c.items.map(n=>({n, p:0, a:0})) }));
            
            let tInc=0, tExp=0;
            state.budget[m].forEach((cat, idx) => {
                const sub = cat.items.reduce((s,i)=>s+i.a,0);
                if(cat.id==='income') tInc+=sub; else tExp+=sub;
                
                const div = document.createElement('div');
                div.className = "glass-card mb-2 overflow-hidden";
                div.innerHTML = `
                    <div class="p-4 flex justify-between items-center" onclick="this.nextElementSibling.classList.toggle('hidden')">
                        <div><span class="text-white font-medium text-sm">${cat.title}</span><span class="text-xs text-[var(--lime-accent)] ml-2">₹${sub}</span></div>
                        <i data-lucide="chevron-down" class="w-4 h-4 text-gray-500"></i>
                    </div>
                    <div class="hidden bg-[#111] p-3 space-y-2">
                        ${cat.items.map((it, i) => `
                            <div class="grid grid-cols-12 gap-2 items-center">
                                <div class="col-span-4 text-xs text-gray-300 truncate">${it.n}</div>
                                <input type="number" class="col-span-4 input-zen p-1 text-center text-xs" value="${it.p||''}" onchange="window.updBud(${idx},${i},'p',this.value)">
                                <input type="number" class="col-span-4 input-zen p-1 text-center text-xs" value="${it.a||''}" onchange="window.updBud(${idx},${i},'a',this.value)">
                            </div>
                        `).join('')}
                    </div>`;
                list.appendChild(div);
            });
            
            document.getElementById('sum-inc').innerText = `₹${tInc}`;
            document.getElementById('sum-exp').innerText = `₹${tExp}`;
            document.getElementById('sum-net').innerText = `₹${tInc-tExp}`;
            lucide.createIcons();
        }

        window.updBud = (c, i, f, v) => { state.budget[state.month][c].items[i][f] = parseFloat(v)||0; saveData(); renderBudget(); };
        window.changeMonth = (v) => { if(v) { state.month = v; renderBudget(); } };
        window.toggleBudgetMode = () => { state.mode = state.mode==='monthly'?'yearly':'monthly'; document.getElementById('budget-view-toggle').innerText = state.mode; renderBudget(); };
        window.sendChat = async () => {
            const txt = document.getElementById('chat-input').value;
            const res = await callGemini(`Act as CFO. User: ${txt}. Data: ${JSON.stringify(state.budget[state.month])}`);
            document.getElementById('chat-history').innerHTML += `<div class="chat-bubble chat-ai">${res}</div>`;
        }

        // --- DEFRAG ---
        function renderDefrag() {
            const d = new Date().toISOString().split('T')[0];
            document.getElementById('defrag-date-display').innerText = d;
            if(!state.defrag[d]) state.defrag[d] = [{t:'',d:false},{t:'',d:false},{t:'',d:false}];
            
            const list = document.getElementById('defrag-list'); list.innerHTML = '';
            state.defrag[d].forEach((it, i) => {
                list.innerHTML += `<div class="glass-panel p-3 flex gap-3 items-center"><input type="checkbox" class="checkbox-zen" ${it.d?'checked':''} onchange="window.togDef(${i})"><input class="bg-transparent w-full text-white outline-none ${it.d?'opacity-50 line-through':''}" value="${it.t}" oninput="window.updDef(${i},this.value)"></div>`;
            });
        }
        window.togDef = (i) => { const d=new Date().toISOString().split('T')[0]; state.defrag[d][i].d=!state.defrag[d][i].d; saveData(); renderDefrag(); };
        window.updDef = (i,v) => { const d=new Date().toISOString().split('T')[0]; state.defrag[d][i].t=v; saveData(); };
        window.optimizeDefrag = async () => { 
            const d=new Date().toISOString().split('T')[0]; 
            const txt=state.defrag[d].map(x=>x.t).join(', '); 
            const res=await callGemini(`Rewrite as executive commands: ${txt}`);
            document.getElementById('defrag-ai-suggestion').innerText=res; 
        };

        // --- UTILS ---
        window.saveNotepad = () => { state.notepad.title = document.getElementById('note-title').value; state.notepad.body = document.getElementById('note-body').value; saveData(); };
        window.addEvent = () => {
            const t=document.getElementById('cal-title').value, d=document.getElementById('cal-date').value;
            if(t&&d) { state.events.push({t,d}); state.events.sort((a,b)=>new Date(a.d)-new Date(b.d)); saveData(); renderEvents(); }
        };
        function renderEvents() {
            const l = document.getElementById('event-list'); l.innerHTML = '';
            const now = new Date();
            let next = null;
            state.events.forEach(e => {
                l.innerHTML += `<div class="glass-panel p-3 flex justify-between"><span class="text-white text-sm">${e.t}</span><span class="text-gray-500 text-xs">${e.d}</span></div>`;
                if(!next && new Date(e.d) >= now) next = e;
            });
            if(next) document.getElementById('dash-event').innerText = `${next.t} (${next.d})`;
        }
        
        window.addMoral = () => { const v=document.getElementById('moral-input').value; if(v){ state.moral.push({t:v,c:false}); saveData(); renderMoral(); } };
        function renderMoral() {
            const l=document.getElementById('moral-list'); l.innerHTML='';
            state.moral.forEach(m => l.innerHTML+=`<div class="glass-panel p-3 mb-2 text-white text-sm">${m.t}</div>`);
        }
        
        async function initSim() {
            const t = await callGemini("One short debate topic:");
            document.getElementById('sim-ui').innerHTML = `<h3 class="text-white text-lg font-bold">${t}</h3><textarea class="w-full h-32 input-zen mt-4 p-3"></textarea><button class="btn-primary w-full mt-4 py-2" onclick="alert('Saved to Training Data')">Complete</button>`;
        }

        // Breathing
        window.startBreathe = (st) => {
            if(breatheInterval) clearInterval(breatheInterval);
            const ring=document.getElementById('breath-ring'), txt=document.getElementById('breath-text'), core=document.getElementById('breath-core');
            let phases = st==='Anxiety' ? [{t:'In',d:4000},{t:'Hold',d:7000},{t:'Out',d:8000}] : [{t:'In',d:4000},{t:'Out',d:4000}];
            let idx=0;
            const run = () => {
                const p = phases[idx];
                txt.innerText = p.t;
                ring.style.transitionDuration = `${p.d}ms`; core.style.transitionDuration = `${p.d}ms`;
                ring.style.strokeDashoffset = p.t==='In' ? 0 : 753;
                core.style.transform = p.t==='In' ? 'scale(1.3)' : 'scale(1)';
                breatheInterval = setTimeout(() => { idx=(idx+1)%phases.length; run(); }, p.d);
            };
            run();
        };
        window.stopBreathe = () => { clearInterval(breatheInterval); window.showScreen('DASHBOARD'); };

        async function callGemini(p) {
            try {
                const r = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-2.5-flash-preview-09-2025:generateContent?key=${apiKey}`, { method: 'POST', headers: {'Content-Type': 'application/json'}, body: JSON.stringify({contents: [{parts: [{text: p}]}]})});
                const d = await r.json();
                return d.candidates[0].content.parts[0].text;
            } catch(e) { return "AI Error"; }
        }

        function refreshUI() {
            if(!document.getElementById('screen-BUDGET').classList.contains('hidden')) renderBudget();
            if(!document.getElementById('screen-CALENDAR').classList.contains('hidden')) renderEvents();
            renderEvents(); // Update dash widget
        }

        window.onload = init;
    </script>
</body>
</html>
